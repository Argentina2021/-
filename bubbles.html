<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>气泡交互展示</title>
  <link rel="stylesheet" href="fonts/misans-vf.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "MiSans VF", "MiSans", sans-serif;
    }

    #app {
      transform-origin: center center;
    }

    #viewport {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      touch-action: none;
      background: #000;
    }

    #bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      background: #000;
    }

    #canvas {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: block;
      width: 1920px;
      height: 1080px;
      cursor: grab;
      background: transparent;
      mix-blend-mode: plus-lighter;
    }

    #canvas.grabbing {
      cursor: grabbing;
    }

    #canvas.pointer {
      cursor: pointer;
    }

    /* 滑动提示 */
    #scroll-hint {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "MiSans VF", "MiSans", sans-serif;
      font-size: 14px;
      color: rgba(180, 230, 255, 0.45);
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.4s;
    }

    #scroll-hint.hidden {
      opacity: 0;
    }

    #scroll-dots {
      display: flex;
      gap: 8px;
    }

    .scroll-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(180, 230, 255, 0.25);
      transition: background 0.3s, transform 0.3s;
    }

    .scroll-dot.active {
      background: rgba(180, 230, 255, 0.75);
      transform: scale(1.25);
    }

    #viewport.card-open #canvas,
    #viewport.card-open #scroll-hint {
      visibility: hidden;
    }

    /* 卡片遮罩 — 仅承载卡片，不遮挡背景 */
    #overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      z-index: 10;
    }

    #overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* 内容卡片 — Figma 组合 11 (49:337) */
    #card {
      position: relative;
      width: 1473px;
      height: 960px;
      transform: scale(0.94) translateY(12px);
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #overlay.active #card {
      transform: scale(1) translateY(0);
    }

    .card-outer-border {
      position: absolute;
      left: 66px;
      top: 0;
      width: 1407px;
      height: 920px;
      border: 1.72px solid #2a4266;
      pointer-events: none;
      z-index: 3;
    }

    .card-outer-bottom {
      position: absolute;
      left: 66px;
      top: 953px;
      width: 1406px;
      height: 2px;
      background: #2a4266;
      pointer-events: none;
      z-index: 3;
    }

    .card-tab {
      position: absolute;
      left: 0;
      top: 0;
      width: 66px;
      height: 290px;
      z-index: 4;
      pointer-events: none;
    }

    .card-tab svg {
      display: block;
      width: 100%;
      height: 100%;
      transform: scale(-1, -1);
      transform-origin: center;
    }

    .card-tab-label {
      position: absolute;
      left: 0;
      top: 24px;
      width: 67px;
      height: 166px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
    }

    .card-tab-label-text {
      display: inline-block;
      font-size: 41px;
      font-weight: 500;
      color: #dbeaff;
      letter-spacing: 0.12em;
      line-height: 66px;
      white-space: nowrap;
      transform: rotate(270deg);
    }

    .card-panel {
      position: absolute;
      left: 85px;
      top: 20px;
      width: 1368px;
      height: 881px;
      overflow: hidden;
    }

    .card-body-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        118deg,
        rgba(10, 24, 26, 0.72) 0%,
        rgba(16, 35, 38, 0.02) 47.6%,
        rgba(10, 24, 26, 0.72) 100%
      );
      pointer-events: none;
    }

    .card-header {
      position: absolute;
      left: 33px;
      top: 33px;
      width: 1281px;
      height: 53px;
      background: linear-gradient(270deg, rgba(11, 24, 26, 0.58) 0%, rgba(42, 65, 102, 0.44) 100%);
      z-index: 2;
    }

    .card-header-accent {
      position: absolute;
      left: 0;
      top: 0;
      width: 5px;
      height: 100%;
      background: #046eff;
    }

    #card-title {
      position: absolute;
      left: 33px;
      top: 7px;
      right: 24px;
      margin: 0;
      font-family: "MiSans VF", "MiSans", sans-serif;
      font-size: 31px;
      font-weight: 500;
      color: #9ebcd9;
      line-height: 1.37;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #card-body {
      position: absolute;
      left: 0;
      right: 0;
      top: 198px;
      bottom: 35px;
      z-index: 1;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 0 54px 12px;
      scrollbar-width: thin;
      scrollbar-color: #c9d9eb transparent;
    }

    #card-body::-webkit-scrollbar {
      width: 5px;
    }

    #card-body::-webkit-scrollbar-track {
      background: transparent;
    }

    #card-body::-webkit-scrollbar-thumb {
      background: #c9d9eb;
      border-radius: 3px;
      box-shadow: 0 0 10px rgba(219, 250, 255, 0.5);
    }

    .card-content {
      width: 1260px;
      margin: 0 auto;
    }

    .card-columns {
      display: flex;
      gap: 30px;
      align-items: flex-start;
    }

    .card-col {
      flex: 1;
      width: 615px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .product-block {
      color: #fff;
    }

    .product-title {
      margin: 0;
      font-size: 28px;
      font-weight: 500;
      line-height: 1.35;
      color: #fff;
    }

    .product-title-sm {
      font-size: 26px;
    }

    .product-divider {
      height: 1px;
      margin: 12px 0 14px;
      background: linear-gradient(90deg, rgba(42, 66, 102, 0.9), rgba(42, 66, 102, 0.2));
    }

    .product-intro {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.92);
    }

    .product-intro p {
      margin: 0 0 10px;
    }

    .product-intro p:last-child {
      margin-bottom: 0;
    }

    .product-body-side {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .product-image {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image img {
      display: block;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .product-block-side .product-image {
      width: 100%;
      max-width: 612.88px;
      margin-top: 14px;
      justify-content: center;
      align-self: center;
    }

    .product-block-side .product-image:not(.product-image-rotate) img {
      width: auto;
      max-width: 164px;
      max-height: 204px;
      height: auto;
      object-fit: contain;
    }

    .product-block-side .product-image-rotate {
      width: 132px;
      height: 196px;
      margin-top: 12px;
      justify-content: center;
      align-items: center;
      align-self: center;
      overflow: visible;
    }

    .product-block-side .product-image-rotate img {
      width: 194px;
      max-width: none;
      height: auto;
      transform: rotate(90deg);
      transform-origin: center center;
    }

    .product-block-stack {
      width: 100%;
    }

    .product-block-stack .product-image {
      width: 100%;
      margin-top: 14px;
      justify-content: flex-start;
      align-items: flex-start;
    }

    .product-block-stack .product-image img {
      width: 100%;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      object-position: left top;
    }

    .product-block-stack .product-image-compact {
      justify-content: center;
      align-items: center;
    }

    .product-block-stack .product-image-compact img {
      width: auto;
      max-width: calc(164px * var(--compact-scale-factor, 1));
      max-height: calc(164px * var(--compact-scale-factor, 1));
      object-position: center center;
    }

    .product-block-stack .product-images-row .product-image-compact {
      flex: 0 1 auto;
      justify-content: center;
      align-items: center;
    }

    .product-block-stack .product-images-row .product-image-compact img {
      width: auto;
      max-width: calc(164px * var(--compact-scale-factor, 1));
      max-height: calc(164px * var(--compact-scale-factor, 1));
      object-position: center center;
    }

    .product-block-stack .product-images-row.product-images-row-wrap {
      flex-wrap: wrap;
      justify-content: center;
    }

    .product-block-stack .product-image-scaled {
      justify-content: center;
      align-items: center;
    }

    .product-block-stack .product-image-scaled img {
      width: calc(100% * var(--img-scale-factor));
      max-width: calc(100% * var(--img-scale-factor));
      object-position: center center;
    }

    .product-block-stack .product-image-uniform {
      height: var(--uniform-img-height, 200px);
      justify-content: center;
      align-items: center;
    }

    .product-block-stack .product-image-uniform img {
      width: auto;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center center;
    }

    .product-block-stack .product-images-row {
      display: flex;
      flex-direction: row;
      gap: 12px;
      width: 100%;
      margin-top: 10px;
      align-items: center;
      justify-content: center;
    }

    .product-block-stack .product-images-row .product-image {
      flex: 1;
      min-width: 0;
      margin-top: 0;
    }

    .product-block-stack .product-images-row .product-image img {
      width: 100%;
      height: auto;
      max-height: 220px;
      object-fit: contain;
      object-position: center center;
    }

    .product-block-stack .product-image + .product-image,
    .product-block-side .product-image + .product-image {
      margin-top: 10px;
    }

    .product-block-stack .product-image + .product-images-row {
      margin-top: 10px;
    }

    .product-contact {
      margin: 12px 0 0;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
    }

    .product-block-side .product-contact {
      text-align: center;
      align-self: center;
    }

    .card-columns-single {
      display: block;
    }

    .card-col-single {
      width: 100%;
    }

    .product-block-single {
      width: 100%;
    }

    .product-block-single .product-intro {
      width: 100%;
    }

    .product-block-single .product-image {
      width: 100%;
      margin-top: 18px;
      justify-content: center;
      align-items: center;
    }

    .product-block-single .product-images-row {
      display: flex;
      flex-direction: row;
      gap: 16px;
      width: 100%;
      margin-top: 18px;
      align-items: stretch;
    }

    .product-block-single .product-images-row .product-image {
      flex: 1;
      min-width: 0;
      margin-top: 0;
      height: 289px;
    }

    .product-block-single .product-images-row .product-image img {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: none;
      object-fit: contain;
      object-position: center center;
    }

    .product-block-single .product-image img {
      width: 100%;
      max-width: 100%;
      max-height: min(52vh, 520px);
      height: auto;
      object-fit: contain;
      object-position: center center;
    }

    .product-block-single .product-contact {
      width: 100%;
      text-align: center;
      margin-top: 16px;
    }

    .card-divider {
      position: absolute;
      left: 59px;
      width: 1249px;
      height: 2px;
      background: #19283d;
      z-index: 2;
      pointer-events: none;
    }

    .card-divider-top {
      top: 196px;
    }

    .card-divider-bottom {
      top: 846px;
    }

    .card-dot {
      position: absolute;
      width: 8px;
      height: 3px;
      background: #046eff;
      z-index: 3;
      pointer-events: none;
    }

    .card-dot-tl { left: 59px;  top: 194px; }
    .card-dot-tr { left: 1300px; top: 194px; }
    .card-dot-bl { left: 59px;  top: 845px; }
    .card-dot-br { left: 1300px; top: 845px; }
    .card-dot-rt { left: 1328px; top: 30px; }
    .card-dot-rb { left: 1328px; top: 868px; }

    .card-stage {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .card-nav {
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      border: 1.5px solid rgba(120, 200, 255, 0.45);
      border-radius: 50%;
      background: rgba(8, 24, 48, 0.55);
      color: rgba(219, 234, 255, 0.9);
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      backdrop-filter: blur(4px);
      z-index: 11;
    }

    .card-nav:hover {
      background: rgba(14, 50, 90, 0.75);
      border-color: rgba(160, 220, 255, 0.75);
      transform: scale(1.06);
    }

    .card-nav:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <video id="bg-video" autoplay muted loop playsinline preload="auto"></video>
      <canvas id="canvas"></canvas>
      <div id="scroll-hint">
        <span>← 左右滑动浏览更多 →</span>
        <div id="scroll-dots"></div>
      </div>
      <div id="overlay">
        <div class="card-stage">
        <button type="button" class="card-nav card-nav-prev" aria-label="上一个企业">‹</button>
        <div id="card">
          <div class="card-outer-border"></div>
          <div class="card-outer-bottom"></div>
          <div class="card-tab">
            <svg viewBox="0 0 65.76 289.82" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M16.41 48.49C3.86 28.13 0 0 0 0v289.82h55.89c5.45 0 9.86-4.42 9.86-9.88V123.14c0-12.29-4.46-19.4-13.67-30.63C42.88 81.28 28.96 68.85 16.41 48.49Z" fill="url(#cardTabGrad)"/>
              <defs>
                <linearGradient id="cardTabGrad" x1="0" y1="289.82" x2="65.76" y2="289.82" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#1D4877"/>
                  <stop offset="0.202" stop-color="#0E62BB"/>
                  <stop offset="0.528" stop-color="#1673C9"/>
                  <stop offset="1" stop-color="#46A2FF"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="card-tab-label">
            <span class="card-tab-label-text">百家数科</span>
          </div>
          <div class="card-panel">
            <div class="card-body-bg"></div>
            <div class="card-header">
              <div class="card-header-accent"></div>
              <h1 id="card-title">雄安国创中心科技有限公司</h1>
            </div>
            <div class="card-divider card-divider-top"></div>
            <div class="card-divider card-divider-bottom"></div>
            <span class="card-dot card-dot-tl"></span>
            <span class="card-dot card-dot-tr"></span>
            <span class="card-dot card-dot-bl"></span>
            <span class="card-dot card-dot-br"></span>
            <span class="card-dot card-dot-rt"></span>
            <span class="card-dot card-dot-rb"></span>
            <div id="card-body"></div>
          </div>
        </div>
        <button type="button" class="card-nav card-nav-next" aria-label="下一个企业">›</button>
        </div>
      </div>
    </div>
  </div>

  <script src="companies.js"></script>
  <script src="product_images.js"></script>
  <script>
    const VIEW_W = 1920;
    const H = 1080;
    const BUBBLE_COUNT = COMPANIES.length;
    const BUBBLES_PER_VIEW = 30;
    const PANEL_COUNT = Math.ceil(BUBBLE_COUNT / BUBBLES_PER_VIEW);
    const WORLD_W = VIEW_W * PANEL_COUNT;
    const FONT_FAMILY = '"MiSans VF", "MiSans", sans-serif';
    let fontsReady = false;
    let labelsPrepared = false;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const overlay = document.getElementById('overlay');
    const cardTitle = document.getElementById('card-title');
    const cardBody = document.getElementById('card-body');
    const cardPrev = document.querySelector('.card-nav-prev');
    const cardNext = document.querySelector('.card-nav-next');
    const app = document.getElementById('app');
    const viewport = document.getElementById('viewport');
    const scrollHint = document.getElementById('scroll-hint');
    const scrollDots = document.getElementById('scroll-dots');

    canvas.width = VIEW_W;
    canvas.height = H;

    let viewScale = 1;
    let scrollX = 0;
    const maxScroll = WORLD_W - VIEW_W;

    function fitStage() {
      viewScale = Math.min(window.innerWidth / VIEW_W, window.innerHeight / H);
      app.style.transform = `scale(${viewScale})`;
    }
    window.addEventListener('resize', fitStage);
    fitStage();

    // 根据企业列表生成气泡配置
    function generateBubbleConfigs() {
      const configs = [];
      for (let i = 0; i < BUBBLE_COUNT; i++) {
        const panel = Math.floor(i / BUBBLES_PER_VIEW);
        const idxInPanel = i % BUBBLES_PER_VIEW;
        const countInPanel = Math.min(BUBBLES_PER_VIEW, BUBBLE_COUNT - panel * BUBBLES_PER_VIEW);
        const cols = 6;
        const rows = Math.ceil(countInPanel / cols);
        const col = idxInPanel % cols;
        const row = Math.floor(idxInPanel / cols);
        const jitterX = Math.sin(i * 2.399) * 0.05;
        const jitterY = Math.cos(i * 1.713) * 0.05;
        const lx = (col + 0.5) / cols + jitterX;
        const ly = (row + 0.5) / rows + jitterY;
        const marginX = 0.05;
        const marginY = 0.05;
        const absX = panel * VIEW_W + marginX * VIEW_W + lx * VIEW_W * (1 - 2 * marginX);
        const absY = marginY * H + ly * H * (1 - 2 * marginY);
        const company = COMPANIES[i];
        configs.push({
          x: absX / WORLD_W,
          y: absY / H,
          title: company.name,
          content: company.products.map(p => p.name).join('、'),
          products: company.products,
        });
      }
      return configs;
    }

    // 气泡半径：统一尺寸 ×0.8
    const BUBBLE_SIZE_SCALE = 0.8;
    const AVG_R = Math.round(92 * BUBBLE_SIZE_SCALE);
    const R_SPREAD = 0;

    const BUBBLE_CONFIGS = generateBubbleConfigs();

    // 空中漂浮物理常量
    const GRAVITY = 0.000020;
    const BUOYANCY = GRAVITY; // 浮力 = 重力，垂直净力为零
    const AIR_DRAG = 0.016;
    const MAX_SPEED = 0.48;

    function bubbleParallax(b) {
      return 0.82 + b.z * 0.18;
    }

    function getAirForce(b, time) {
      const t = time * 0.001;
      const influence = 0.28 + b.z * 0.72;

      const globalX = Math.sin(t * 0.11 + 0.4) * 0.006
        + Math.sin(t * 0.063 + 1.8) * 0.004
        + Math.sin(t * 0.028 + 2.6) * 0.003;
      const globalY = Math.cos(t * 0.085 + 0.9) * 0.003
        + Math.sin(t * 0.051 + 3.1) * 0.002;

      const localX = Math.sin(t * b.swayFreq1 + b.swayPhase1) * 0.011
        + Math.sin(t * b.swayFreq2 + b.swayPhase2) * 0.007
        + Math.sin(t * 0.27 + b.swayPhase3) * 0.004;
      const localY = Math.cos(t * b.swayFreq1 * 0.87 + b.swayPhase2) * 0.009
        + Math.cos(t * b.swayFreq2 * 1.25 + b.swayPhase1) * 0.005;

      const gust = Math.sin(t * 0.042 + b.gustPhase) * Math.cos(t * 0.029 + b.gustPhase * 1.7);

      return {
        fx: (globalX + localX + gust * 0.005) * influence,
        fy: (globalY + localY + gust * 0.003) * influence,
      };
    }

    class Bubble {
      constructor(cfg, index) {
        this.baseR = AVG_R + (Math.random() - 0.5) * R_SPREAD * 2;
        this.r = this.baseR;
        this.x = cfg.x * WORLD_W;
        this.y = cfg.y * H;
        // 空间纵深：0 远 1 近
        this.z = 0.12 + Math.random() * 0.88;
        this.depthScale = 0.68 + this.z * 0.42;
        this.depthAlpha = 0.38 + this.z * 0.62;

        this.vx = (Math.random() - 0.5) * 0.08;
        this.vy = (Math.random() - 0.5) * 0.06;
        this.mass = this.baseR * this.baseR * (0.7 + this.z * 0.3);

        this.title = cfg.title || `企业 ${index + 1}`;
        this.content = cfg.content || '';
        this.products = cfg.products || [];

        this.swayPhase1 = Math.random() * Math.PI * 2;
        this.swayPhase2 = Math.random() * Math.PI * 2;
        this.swayPhase3 = Math.random() * Math.PI * 2;
        this.gustPhase = Math.random() * Math.PI * 2;
        this.swayFreq1 = 0.12 + Math.random() * 0.22;
        this.swayFreq2 = 0.06 + Math.random() * 0.14;
        this.swayX = 0;
        this.swayY = 0;
        this.wobblePhase = Math.random() * Math.PI * 2;

        this.breathPhase = Math.random() * Math.PI * 2;
        this.breathSpeed = 0.35 + Math.random() * 0.28;
        this.breathAmp = 0.04 + Math.random() * 0.08;
        this.sizeScale = 1;
        this.hoverScale = 1;
        this.targetHoverScale = 1;
        this.labelLayout = null;
        this.index = index;
      }

      update(time, dt) {
        const t = time * 0.001;
        const air = getAirForce(this, time);
        const vol = this.baseR * this.baseR;

        // 浮力 = 重力，无持续上浮/下沉
        const lift = (BUOYANCY * vol - GRAVITY * vol) * dt;
        const drag = AIR_DRAG * (0.85 + (1 - this.z) * 0.25);

        const ax = air.fx - this.vx * drag;
        const ay = air.fy + lift - this.vy * drag;

        this.vx += ax * dt;
        this.vy += ay * dt;

        const maxSpeed = MAX_SPEED * (0.75 + this.z * 0.35);
        const speed = Math.hypot(this.vx, this.vy);
        if (speed > maxSpeed) {
          this.vx = (this.vx / speed) * maxSpeed;
          this.vy = (this.vy / speed) * maxSpeed;
        }

        // 飘忽晃动 — 叠加在物理位移上的轻柔摆动
        this.swayX = Math.sin(t * this.swayFreq1 + this.swayPhase1) * (3 + this.z * 4)
          + Math.sin(t * this.swayFreq2 * 1.6 + this.swayPhase3) * (1.5 + this.z * 2);
        this.swayY = Math.cos(t * this.swayFreq2 + this.swayPhase2) * (2.5 + this.z * 3)
          + Math.cos(t * this.swayFreq1 * 0.7 + this.swayPhase1) * (1.2 + this.z * 1.8);

        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // 呼吸起伏
        this.sizeScale = 1
          + Math.sin(t * this.breathSpeed + this.breathPhase) * this.breathAmp
          + Math.sin(t * this.breathSpeed * 0.55 + this.breathPhase * 1.7) * this.breathAmp * 0.3;
        this.hoverScale += (this.targetHoverScale - this.hoverScale) * 0.08;
        this.r = this.baseR * this.sizeScale * this.hoverScale * this.depthScale;
        this.mass = this.baseR * this.baseR * (0.7 + this.z * 0.3);

        // 软边界 — 轻柔回弹，不弹飞
        const pad = this.r + 4;
        const soft = 0.012 * dt;
        if (this.x < pad) { this.x += (pad - this.x) * 0.06; this.vx = Math.abs(this.vx) * 0.08 + soft; }
        if (this.x + pad > WORLD_W) { this.x -= (this.x + pad - WORLD_W) * 0.06; this.vx = -Math.abs(this.vx) * 0.08 - soft; }
        if (this.y < pad) { this.y += (pad - this.y) * 0.06; this.vy = Math.abs(this.vy) * 0.08 + soft * 0.5; }
        if (this.y + pad > H) { this.y -= (this.y + pad - H) * 0.06; this.vy = -Math.abs(this.vy) * 0.08 - soft * 0.5; }
      }

      drawX(scroll) {
        return this.x + scroll * (1 - bubbleParallax(this));
      }

      contains(worldX, worldY, scroll) {
        const cx = this.drawX(scroll) + this.swayX;
        const cy = this.y + this.swayY;
        const dx = worldX - cx;
        const dy = worldY - cy;
        // 远处气泡略扩大点击区域，避免太小点不中
        const hitR = this.r * (1.04 + (1 - this.z) * 0.1);
        return dx * dx + dy * dy <= hitR * hitR;
      }
    }

    // 圆-圆碰撞
    function resolveCollision(a, b) {
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = a.r + b.r;

      if (dist === 0 || dist >= minDist) return;

      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = minDist - dist;

      const totalMass = a.mass + b.mass;
      a.x -= nx * overlap * (b.mass / totalMass);
      a.y -= ny * overlap * (b.mass / totalMass);
      b.x += nx * overlap * (a.mass / totalMass);
      b.y += ny * overlap * (a.mass / totalMass);

      const dvx = a.vx - b.vx;
      const dvy = a.vy - b.vy;
      const dvn = dvx * nx + dvy * ny;

      if (dvn > 0) return;

      const restitution = 0.22;
      const impulse = (-(1 + restitution) * dvn) / (1 / a.mass + 1 / b.mass);

      a.vx -= (impulse / a.mass) * nx * 0.65;
      a.vy -= (impulse / a.mass) * ny * 0.65;
      b.vx += (impulse / b.mass) * nx * 0.65;
      b.vy += (impulse / b.mass) * ny * 0.65;
    }

    const bubbles = BUBBLE_CONFIGS.map((cfg, i) => new Bubble(cfg, i));
    let hoveredBubble = null;
    let activeBubble = null;

    // 气泡内企业名称换行
    function wrapTextLines(ctx, text, maxWidth) {
      const chars = [...text];
      const lines = [];
      let line = '';
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    function computeLabelLayout(bubble) {
      const r = bubble.baseR;
      const maxWidth = r * 1.45;
      let fontSize = Math.min(r * 0.19, 17);
      let lines = [];
      for (let i = 0; i < 8; i++) {
        ctx.font = `520 ${fontSize}px ${FONT_FAMILY}`;
        lines = wrapTextLines(ctx, bubble.title, maxWidth);
        if (lines.length <= 4) break;
        fontSize -= 1;
      }
      bubble.labelLayout = {
        lines,
        fontSize,
        lineHeight: fontSize * 1.22,
      };
    }

    function prepareAllLabelLayouts() {
      if (!fontsReady || labelsPrepared) return;
      for (const b of bubbles) computeLabelLayout(b);
      labelsPrepared = true;
    }

    function drawBubbleLabel(ctx, bubble) {
      if (!bubble.title || !fontsReady) return;
      if (!bubble.labelLayout) computeLabelLayout(bubble);

      const { lines, fontSize, lineHeight } = bubble.labelLayout;
      const breathScale = bubble.r / bubble.baseR;

      ctx.save();
      ctx.scale(breathScale, breathScale);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.93)';
      ctx.shadowColor = 'rgba(0, 40, 80, 0.35)';
      ctx.shadowBlur = 4 / breathScale;
      ctx.font = `520 ${fontSize}px ${FONT_FAMILY}`;

      const totalH = lines.length * lineHeight;
      let y = -totalH / 2 + lineHeight / 2;
      for (const ln of lines) {
        ctx.fillText(ln, 0, y);
        y += lineHeight;
      }
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // 绘制单个气泡 — 半透明 3D，带纵深虚实
    function drawBubble(b, time, scroll) {
      const t = time * 0.001;
      const r = b.r;
      const wobble = 1 + Math.sin(t * 1.1 + b.wobblePhase) * 0.006;
      const dx = b.drawX(scroll) + b.swayX;
      const dy = b.y + b.swayY;
      const depthBlur = (1 - b.z) * 2.5;

      ctx.save();
      ctx.globalAlpha = b.depthAlpha;
      ctx.translate(dx, dy);
      ctx.scale(wobble, 1 / wobble * (1 + (wobble - 1) * 0.25));

      // 远处气泡略虚
      if (depthBlur > 0.3) {
        ctx.shadowColor = 'rgba(120, 210, 255, 0.15)';
        ctx.shadowBlur = depthBlur;
      }

      // 外层光晕
      const outerGlow = ctx.createRadialGradient(0, 0, r * 0.6, 0, 0, r * 1.8);
      outerGlow.addColorStop(0, `rgba(100, 200, 255, ${0.05 + b.z * 0.03})`);
      outerGlow.addColorStop(0.5, 'rgba(80, 180, 240, 0.03)');
      outerGlow.addColorStop(1, 'rgba(60, 160, 220, 0)');
      ctx.beginPath();
      ctx.arc(0, 0, r * 1.8, 0, Math.PI * 2);
      ctx.fillStyle = outerGlow;
      ctx.fill();

      // 主体 — 深色中心 + 边缘透光
      const body = ctx.createRadialGradient(-r * 0.15, -r * 0.2, r * 0.05, 0, 0, r);
      body.addColorStop(0, 'rgba(5, 15, 25, 0.15)');
      body.addColorStop(0.35, 'rgba(10, 30, 50, 0.08)');
      body.addColorStop(0.65, 'rgba(60, 180, 230, 0.12)');
      body.addColorStop(0.85, 'rgba(120, 210, 255, 0.35)');
      body.addColorStop(0.95, 'rgba(180, 235, 255, 0.55)');
      body.addColorStop(1, 'rgba(200, 245, 255, 0.7)');

      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fillStyle = body;
      ctx.fill();

      // 边缘 rim light
      ctx.beginPath();
      ctx.arc(0, 0, r - 1, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(160, 230, 255, 0.45)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 顶部高光弧
      ctx.beginPath();
      ctx.ellipse(-r * 0.22, -r * 0.32, r * 0.35, r * 0.18, -0.4, 0, Math.PI * 2);
      const highlight = ctx.createRadialGradient(-r * 0.22, -r * 0.32, 0, -r * 0.22, -r * 0.32, r * 0.4);
      highlight.addColorStop(0, 'rgba(255, 255, 255, 0.55)');
      highlight.addColorStop(0.4, 'rgba(200, 240, 255, 0.2)');
      highlight.addColorStop(1, 'rgba(200, 240, 255, 0)');
      ctx.fillStyle = highlight;
      ctx.fill();

      // 小 specular 点
      ctx.beginPath();
      ctx.arc(-r * 0.28, -r * 0.38, r * 0.07, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
      ctx.fill();

      // 底部反射弧
      ctx.beginPath();
      ctx.ellipse(r * 0.1, r * 0.38, r * 0.28, r * 0.1, 0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(100, 200, 255, 0.12)';
      ctx.fill();

      // hover 时增强边缘
      if (b.targetHoverScale > 1) {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(180, 240, 255, 0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      drawBubbleLabel(ctx, b);

      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function render(time) {
      ctx.clearRect(0, 0, VIEW_W, H);
      if (overlay.classList.contains('active')) return;

      ctx.save();
      ctx.translate(-scrollX, 0);

      // 远 → 近 绘制，近处气泡在上层
      const sorted = [...bubbles].sort((a, b) => a.z - b.z || a.r - b.r);
      for (const b of sorted) {
        const drawX = b.drawX(scrollX);
        if (drawX + b.r < scrollX - 30 || drawX - b.r > scrollX + VIEW_W + 30) continue;
        drawBubble(b, time, scrollX);
      }

      ctx.restore();
    }

    function physicsStep(time, dt) {
      if (overlay.classList.contains('active')) return;
      for (const b of bubbles) b.update(time, dt);

      for (let i = 0; i < bubbles.length; i++) {
        for (let j = i + 1; j < bubbles.length; j++) {
          resolveCollision(bubbles[i], bubbles[j]);
        }
      }
    }

    function onPanStart(clientX) {
      if (overlay.classList.contains('active')) return;
      isPanning = true;
      panMoved = false;
      panStartX = clientX;
      panStartScroll = scrollX;
      canvas.classList.add('grabbing');

      if (!isPanning) return;
      const dx = (clientX - panStartX) / viewScale;
      if (Math.abs(dx) > DRAG_THRESHOLD) panMoved = true;
      setScroll(panStartScroll - dx);

    }

    function formatIntro(intro) {
      if (!intro) return '';
      const lines = intro.split('\n').map((line) => line.trim()).filter(Boolean);
      if (lines.length <= 1) return `<p>${escapeHtml(intro)}</p>`;
      return lines.map((line) => `<p>${escapeHtml(line)}</p>`).join('');
    }

    function splitProducts(products) {
      const left = [];
      const right = [];
      products.forEach((product, index) => {
        (index % 2 === 0 ? left : right).push(product);
      });
      return [left, right];
    }

    function getProductLayout(name) {
      return PRODUCT_LAYOUT[name] || 'stack';
    }

    function getProductImages(product) {
      if (product.images && product.images.length) return product.images;
      const fallback = PRODUCT_IMAGES[product.name];
      return fallback ? [fallback] : [];
    }

    function renderProductImages(product, layout, company = '') {
      const images = getProductImages(product);
      if (!images.length) return '';

      const renderOne = (src, index) => {
        const rotate = layout === 'side' && PRODUCT_IMAGE_ROTATE.has(product.name) && index === 0;
        const compact = layout === 'stack' && PRODUCT_IMAGE_COMPACT.has(product.name);
        const uniform = layout === 'stack' && PRODUCT_IMAGE_UNIFORM.has(product.name);
        const compactScale = layout === 'stack' ? PRODUCT_IMAGE_COMPACT_SCALE[product.name] : null;
        const scale = layout === 'stack' ? PRODUCT_IMAGE_SCALE[product.name] : null;
        const cls = [
          'product-image',
          rotate ? 'product-image-rotate' : '',
          compact ? 'product-image-compact' : '',
          uniform ? 'product-image-uniform' : '',
          scale ? 'product-image-scaled' : '',
        ].filter(Boolean).join(' ');
        const scaleVars = [];
        if (compactScale) scaleVars.push(`--compact-scale-factor: ${compactScale}`);
        if (uniform) scaleVars.push(`--uniform-img-height: ${PRODUCT_IMAGE_UNIFORM_HEIGHT}px`);
        if (scale) scaleVars.push(`--img-scale-factor: ${scale}`);
        const scaleStyle = scaleVars.length ? ` style="${scaleVars.join('; ')}"` : '';
        return `<div class="${cls}"${scaleStyle}><img src="${escapeHtml(src)}" alt=""></div>`;
      };

      if (layout === 'single' && images.length > 1 && PRODUCT_IMAGES_ROW.has(product.name)) {
        return `<div class="product-images-row">${images.map(renderOne).join('')}</div>`;
      }

      const rowAfter = layout === 'stack' ? PRODUCT_IMAGES_ROW_AFTER[product.name] : null;
      if (rowAfter != null && images.length > rowAfter) {
        const head = images.slice(0, rowAfter).map((src, index) => renderOne(src, index)).join('');
        const tail = images.slice(rowAfter);
        const wrap = tail.length > 2 ? ' product-images-row-wrap' : '';
        const row = `<div class="product-images-row${wrap}">${tail.map((src, index) => renderOne(src, rowAfter + index)).join('')}</div>`;
        return head + row;
      }

      return images.map(renderOne).join('');
    }

    function renderProductBlock(product, options = {}) {
      const { single = false, company = '' } = options;
      const layout = single ? 'single' : getProductLayout(product.name);
      const contact = product.contact || '';
      const titleClass = PRODUCT_TITLE_SM.has(product.name) ? 'product-title product-title-sm' : 'product-title';
      const imageHtml = renderProductImages(product, layout, company);
      const contactHtml = contact
        ? `<p class="product-contact">${escapeHtml(contact)}</p>`
        : '';

      if (single) {
        return `
          <article class="product-block product-block-single">
            <h2 class="${titleClass}">${escapeHtml(product.name)}</h2>
            <div class="product-divider"></div>
            <div class="product-intro">${formatIntro(product.intro)}</div>
            ${imageHtml}
            ${contactHtml}
          </article>`;
      }

      if (layout === 'side') {
        return `
          <article class="product-block product-block-side">
            <h2 class="${titleClass}">${escapeHtml(product.name)}</h2>
            <div class="product-divider"></div>
            <div class="product-body-side">
              <div class="product-intro">${formatIntro(product.intro)}</div>
              ${imageHtml}
              ${contactHtml}
            </div>
          </article>`;
      }

      return `
        <article class="product-block product-block-stack">
          <h2 class="${titleClass}">${escapeHtml(product.name)}</h2>
          <div class="product-divider"></div>
          <div class="product-intro">${formatIntro(product.intro)}</div>
          ${imageHtml}
          ${contactHtml}
        </article>`;
    }

    function renderCardContent(bubble) {
      const products = bubble.products || [];
      if (!products.length) {
        cardBody.innerHTML = '';
        return;
      }

      if (products.length === 1) {
        cardBody.innerHTML = `
          <div class="card-content">
            <div class="card-columns card-columns-single">
              <div class="card-col card-col-single">
                ${renderProductBlock(products[0], { single: true, company: bubble.title })}
              </div>
            </div>
          </div>`;
        cardBody.scrollTop = 0;
        return;
      }

      let columns;
      const customColumns = COMPANY_COLUMNS[bubble.title];
      if (customColumns) {
        const productMap = Object.fromEntries(products.map((product) => [product.name, product]));
        columns = customColumns.map((names) => names.map((name) => productMap[name]).filter(Boolean));
      } else {
        columns = splitProducts(products);
      }

      cardBody.innerHTML = `
        <div class="card-content">
          <div class="card-columns">
            <div class="card-col">${columns[0].map((p) => renderProductBlock(p, { company: bubble.title })).join('')}</div>
            <div class="card-col">${columns[1].map((p) => renderProductBlock(p, { company: bubble.title })).join('')}</div>
          </div>
        </div>`;
      cardBody.scrollTop = 0;
    }

    function openCard(bubble) {
      activeBubble = bubble;
      cardTitle.textContent = bubble.title;
      renderCardContent(bubble);
      viewport.classList.add('card-open');
      overlay.classList.add('active');
    }

    function closeCard() {
      overlay.classList.remove('active');
      viewport.classList.remove('card-open');
      activeBubble = null;
    }

    function navigateCard(delta) {
      if (!activeBubble) return;
      const nextIndex = (activeBubble.index + delta + bubbles.length) % bubbles.length;
      openCard(bubbles[nextIndex]);
    }

    cardPrev.addEventListener('click', (e) => {
      e.stopPropagation();
      navigateCard(-1);
    });
    cardNext.addEventListener('click', (e) => {
      e.stopPropagation();
      navigateCard(1);
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeCard();
    });
    document.addEventListener('keydown', (e) => {
      if (!overlay.classList.contains('active')) return;
      if (e.key === 'Escape') closeCard();
      if (e.key === 'ArrowLeft') navigateCard(-1);
      if (e.key === 'ArrowRight') navigateCard(1);
    });
  </script>
</body>
</html>
